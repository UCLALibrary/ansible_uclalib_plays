---

- name: Create and activate swap partitions
  hosts: "*avalon*"
  become: true

  tasks:
    - name: Create swap partition
      parted:
        device: /dev/sdb
        # fs_type: linux-swap # not supported in ansible 2.9.27
        label: msdos
        number: 1
        part_start: '0%'
        part_end: '100%'
        part_type: primary
        state: present

    - name: Format swap partition
      # fails when swap is mounted, as it should fail.
      command:
        argv:
          - /usr/sbin/mkswap
          - --label
          - SWAP
          - /dev/sdb1
      register: mkswap
      failed_when:
        - mkswap.rc != 0
        - '"mkswap: error: /dev/sdb1 is mounted; will not make swapspace" not in mkswap.stderr'
      changed_when:
        - '"mkswap: error: /dev/sdb1 is mounted; will not make swapspace" not in mkswap.stderr'

    - name: Add swap to fstab
      mount:
        path: swap
        src: LABEL=SWAP
        fstype: swap
        state: present

    - name: Activate swap
      command:
        argv:
          - /usr/sbin/swapon
          - --all
          - --verbose
      register: swapon
      changed_when:
        - '"swapon: /dev/sdb1: found signature" in swapon.stderr'
